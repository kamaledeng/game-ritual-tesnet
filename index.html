<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Ritual Arcade Slots, demo slot-style game for Ritual testnet."
    />
    <title>Ritual Arcade Slots</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="play-surface" aria-label="Ritual Arcade Slots">
        <header class="topbar">
          <div>
            <p class="eyebrow">Ritual Testnet</p>
            <h1>Ritual Arcade Slots</h1>
          </div>
          <div class="wallet-panel">
            <div class="network-pill" id="networkStatus">Not connected</div>
            <button class="icon-button" id="connectWallet" type="button" title="Connect wallet">
              Connect
            </button>
          </div>
        </header>

        <div class="game-layout">
          <aside class="theme-rail" aria-label="Theme list">
            <div class="theme-rail__header">
              <span>Theme</span>
              <strong id="themeCount">20</strong>
            </div>
            <div class="theme-list" id="themeList"></div>
          </aside>

          <section class="machine" aria-label="Slot machine">
            <div class="machine__header">
              <div>
                <p id="selectedProvider">Original demo</p>
                <h2 id="selectedTheme">Olympus Gates</h2>
              </div>
              <div class="balance-box">
                <span>Demo Credit</span>
                <strong id="credits">1000</strong>
              </div>
            </div>

            <div class="reels" id="reels" aria-live="polite"></div>

            <div class="result-strip">
              <span id="resultText">Pilih tema, atur bet, lalu spin.</span>
              <strong id="lastWin">0</strong>
            </div>

            <div class="controls">
              <label class="bet-control" for="betAmount">
                <span>Bet</span>
                <input id="betAmount" type="range" min="10" max="100" step="10" value="20" />
                <strong id="betLabel">20</strong>
              </label>
              <button class="primary-button" id="spinButton" type="button">Spin</button>
              <button class="secondary-button" id="recordButton" type="button" disabled>
                Record On-Chain
              </button>
            </div>
          </section>

          <aside class="stats-panel" aria-label="Stats">
            <div class="stat">
              <span>Session Spins</span>
              <strong id="spinCount">0</strong>
            </div>
            <div class="stat">
              <span>Best Win</span>
              <strong id="bestWin">0</strong>
            </div>
            <div class="stat">
              <span>Chain ID</span>
              <strong>1979</strong>
            </div>
            <div class="status-log" id="statusLog">
              Ready for demo play.
            </div>
          </aside>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
